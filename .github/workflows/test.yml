name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Minimal permissions for security
permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run ruff linter
      run: |
        echo "🔍 Running ruff linter..."
        ruff check src/ tests/ --output-format=github
      continue-on-error: false

    - name: Run bandit security scanner
      run: |
        echo "🔒 Running bandit security scanner..."
        bandit -r src/ -f json -o bandit-report.json -s B101,B106,B107,B112,B601 || true
        bandit -r src/ -f screen -s B101,B106,B107,B112,B601
      continue-on-error: false

    - name: Run mypy type checker
      run: |
        echo "🔎 Running mypy type checker..."
        mypy src/wilma --show-error-codes --pretty
      continue-on-error: true  # Intentional: type hints are incremental, don't block CI

    - name: Run unit and integration tests with coverage
      run: |
        echo "🧪 Running unit and integration tests with coverage..."
        pytest \
          --cov=wilma \
          --cov-report=term-missing \
          --cov-report=xml \
          --cov-report=html \
          --cov-fail-under=50  # Matches PR template requirements \
          -v \
          -m "not slow"
      env:
        AWS_DEFAULT_REGION: us-east-1

    - name: Run contract tests
      run: |
        echo "📋 Running contract tests..."
        pytest -v -m contract
      env:
        AWS_DEFAULT_REGION: us-east-1

    - name: Upload coverage reports
      if: matrix.python-version == '3.11'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-reports
        path: |
          coverage.xml
          htmlcov/
          bandit-report.json

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.test.result }}" == "failure" ]; then
          echo "❌ Tests failed! Please fix the issues before merging."
          exit 1
        elif [ "${{ needs.test.result }}" == "success" ]; then
          echo "✅ All tests passed successfully!"
        else
          echo "⚠️ Tests completed with status: ${{ needs.test.result }}"
        fi
